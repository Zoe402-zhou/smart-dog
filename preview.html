<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水果英语闪卡</title>

<style>
body {
  font-family: Arial;
  background: #fff3e6;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #e67e22;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

.emoji {
  font-size: 50px;
}

.word {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🍎 水果英语闪卡</h1>
<p>点击卡片听发音</p>

<div class="grid" id="grid"></div>

<script>
const fruits = [
  { word: "apple", emoji: "🍎" },
  { word: "banana", emoji: "🍌" },
  { word: "orange", emoji: "🍊" },
  { word: "grape", emoji: "🍇" },
  { word: "watermelon", emoji: "🍉" },
  { word: "lemon", emoji: "🍋" },
  { word: "peach", emoji: "🍑" },
  { word: "cherry", emoji: "🍒" }
];

const grid = document.getElementById("grid");

function speak(word) {
  const msg = new SpeechSynthesisUtterance(word);
  msg.lang = "en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

fruits.forEach(f => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="emoji">${f.emoji}</div>
    <div class="word">${f.word}</div>
  `;

  div.onclick = () => speak(f.word);

  grid.appendChild(div);
});
</script>

</body>
</html>
