<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>水果闪卡</title>
</head>

<body style="text-align:center; background:#f5e6d3;">

<h2>🍎 水果英语闪卡</h2>

<div id="box"></div>

<script>
const fruits = [
  { word: "apple", image: "images/fruits/apple.jpg" }
];

function speak(word){
  let msg = new SpeechSynthesisUtterance(word);
  msg.lang = "en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

let box = document.getElementById("box");

fruits.forEach(f=>{
  let div = document.createElement("div");

  div.innerHTML = `
    <img src="${f.image}" width="150"><br>
    <b>${f.word}</b>
  `;

  div.onclick = ()=>speak(f.word);

  box.appendChild(div);
});
</script>

</body>
</html>
